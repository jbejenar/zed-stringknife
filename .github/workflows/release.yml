name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build LSP binary
        run: cargo build --manifest-path stringknife-lsp/Cargo.toml --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd stringknife-lsp/target/${{ matrix.target }}/release
          tar czf ../../../../stringknife-lsp-${{ matrix.target }}.tar.gz stringknife-lsp
          cd ../../../..
          shasum -a 256 stringknife-lsp-${{ matrix.target }}.tar.gz > stringknife-lsp-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd stringknife-lsp/target/${{ matrix.target }}/release
          Compress-Archive -Path stringknife-lsp.exe -DestinationPath ../../../../stringknife-lsp-${{ matrix.target }}.zip
          cd ../../../..
          Get-FileHash stringknife-lsp-${{ matrix.target }}.zip -Algorithm SHA256 | Format-List Hash | Out-File stringknife-lsp-${{ matrix.target }}.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stringknife-lsp-${{ matrix.target }}
          path: stringknife-lsp-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
